<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Mapping Dissonance{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <!-- CSRF token for JS fetch() POST requests -->
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <!-- Theme init: prevents flash of wrong theme on load -->
  <script>
    (function() {
      if (localStorage.getItem('md-theme') === 'dark')
        document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="site-nav">
    <a href="/" class="nav-logo">Mapping Dissonance</a>
    <div class="nav-links">
      <a href="/mapping-dissonance" class="nav-cta">The Archive &rarr;</a>
      <a href="/bird-list">Bird List</a>
      <a href="/ledger">Ledger</a>
      <a href="/bibliography">Bibliography</a>
      <a href="/about">About</a>
      <a href="{{ url_for('static', filename='WPMD.pdf') }}" target="_blank" rel="noopener">Whitepaper</a>
      {% if current_user.is_authenticated %}
        <span class="nav-user">{{ current_user.email }}</span>
        <a href="/logout">Sign out</a>
      {% else %}
        <a href="/login">Contribute</a>
      {% endif %}
      <button id="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode">&#9680;</button>
    </div>
  </nav>
  {% block content %}{% endblock %}
  <script>
    function toggleTheme() {
      var html = document.documentElement;
      if (html.getAttribute('data-theme') === 'dark') {
        html.removeAttribute('data-theme');
        localStorage.setItem('md-theme', 'light');
      } else {
        html.setAttribute('data-theme', 'dark');
        localStorage.setItem('md-theme', 'dark');
      }
    }
  </script>
</body>
</html>
