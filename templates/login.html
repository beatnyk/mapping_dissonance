{% extends "base.html" %}
{% block title %}Sign in — Mapping Dissonance{% endblock %}

{% block content %}
<div class="auth-container">
  <h2 class="auth-title">Sign in</h2>
  <p class="auth-sub">Contributor access</p>
  <form method="POST" class="auth-form">
    <div class="auth-field">
      <label class="auth-label" for="username">Username</label>
      <input class="auth-input" type="text" id="username" name="username" required autocomplete="username">
    </div>
    <div class="auth-field">
      <label class="auth-label" for="password">Password</label>
      <input class="auth-input" type="password" id="password" name="password" required autocomplete="current-password">
    </div>
    <button type="submit" class="auth-submit">Sign in →</button>
  </form>
  <p class="auth-footer">No account? <a href="/register">Register here</a></p>
</div>
{% endblock %}
