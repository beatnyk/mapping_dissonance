{% extends "base.html" %}
{% block title %}Register — Mapping Dissonance{% endblock %}

{% block content %}
<div class="auth-container">
  <h2 class="auth-title">Create account</h2>
  <p class="auth-sub">Contributor registration</p>
  <form method="POST" class="auth-form">
    <div class="auth-field">
      <label class="auth-label" for="username">Choose a username</label>
      <input class="auth-input" type="text" id="username" name="username" required autofocus autocomplete="username">
    </div>
    <div class="auth-field">
      <label class="auth-label" for="password">Choose a password</label>
      <input class="auth-input" type="password" id="password" name="password" required autocomplete="new-password">
    </div>
    <button type="submit" class="auth-submit">Register →</button>
  </form>
  <p class="auth-footer">Already have an account? <a href="/login">Sign in</a></p>
</div>
{% endblock %}
